<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartographie Interactive des Cheminements</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        #map {
            height: calc(100vh - 80px);
            width: 100%;
        }
        .popup-image {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid #ddd;
        }
        .legend {
            background: white;
            padding: 10px;
            line-height: 18px;
            color: #555;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.7;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Header -->
    <header class="bg-blue-800 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">Amélioration des Cheminements</h1>
        <div id="status" class="text-sm bg-blue-700 px-3 py-1 rounded">Chargement des données...</div>
    </header>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Initialisation de la carte
        const map = L.map('map').setView([46.603354, 1.888334], 6); // Centré sur la France par défaut

        // Couche de base (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // --- CONFIGURATION DES STYLES ---

        // Style pour les données existantes (donnes.geojson)
        const styles = {
            evenement: { // Points
                radius: 8,
                fillColor: "#e11d48", // Rose/Rouge
                color: "#fff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            },
            revetement: { // Polygones
                fillColor: "#3b82f6", // Bleu
                weight: 2,
                opacity: 1,
                color: 'white',
                dashArray: '3',
                fillOpacity: 0.4
            },
            passagePieton: { // Lignes
                color: "#f59e0b", // Orange
                weight: 5,
                opacity: 0.8
            },
            idee: { // Nouvelle source (idee.geojson)
                radius: 8,
                fillColor: "#10b981", // Vert
                color: "#fff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.9
            }
        };

        // --- FONCTIONS UTILITAIRES ---

        // Fonction pour générer le contenu du popup
        function createPopupContent(feature, title) {
            let props = feature.properties;
            let html = `<div class="p-2">
                <h3 class="font-bold text-lg border-b mb-2">${props.nom || title}</h3>
                <p class="text-sm text-gray-700">${props.description || 'Aucune description disponible.'}</p>`;

            // Gestion de la photo avec ajout du .png si nécessaire
            if (props.photo) {
                let fileName = props.photo.toString();
                if (!fileName.toLowerCase().endsWith('.png')) {
                    fileName += '.png';
                }
                html += `<img src="${fileName}" alt="Photo" class="popup-image" onerror="this.onerror=null; this.src='https://placehold.co/300x200?text=Image+non+disponible';">`;
            }

            html += `</div>`;
            return html;
        }

        // --- CHARGEMENT DES DONNÉES ---

        async function loadGeoJSON() {
            try {
                // 1. Chargement de donnes.geojson
                const responseDonnes = await fetch('donnes.geojson');
                if (responseDonnes.ok) {
                    const data = await responseDonnes.json();
                    
                    L.geoJSON(data, {
                        style: function(feature) {
                            switch (feature.geometry.type) {
                                case 'LineString': 
                                case 'MultiLineString': return styles.passagePieton;
                                case 'Polygon':
                                case 'MultiPolygon': return styles.revetement;
                                default: return {};
                            }
                        },
                        pointToLayer: function(feature, latlng) {
                            return L.circleMarker(latlng, styles.evenement);
                        },
                        onEachFeature: function(feature, layer) {
                            let typeLabel = "Information";
                            if (feature.geometry.type === 'Point') typeLabel = "Événement";
                            if (feature.geometry.type.includes('Line')) typeLabel = "Passage Piéton";
                            if (feature.geometry.type.includes('Polygon')) typeLabel = "Revêtement Trottoir";
                            
                            layer.bindPopup(createPopupContent(feature, typeLabel));
                        }
                    }).addTo(map);
                }

                // 2. Chargement de idee.geojson
                const responseIdees = await fetch('idee.geojson');
                if (responseIdees.ok) {
                    const dataIdees = await responseIdees.json();
                    
                    L.geoJSON(dataIdees, {
                        pointToLayer: function(feature, latlng) {
                            return L.circleMarker(latlng, styles.idee);
                        },
                        onEachFeature: function(feature, layer) {
                            layer.bindPopup(createPopupContent(feature, "Idée d'amélioration"));
                        }
                    }).addTo(map);
                }

                document.getElementById('status').innerText = "Données chargées";
                setTimeout(() => document.getElementById('status').style.display = 'none', 3000);

                // Ajuster la vue si des données sont présentes (optionnel)
                // map.fitBounds(allLayers.getBounds());

            } catch (error) {
                console.error("Erreur lors du chargement des GeoJSON:", error);
                document.getElementById('status').innerText = "Erreur de chargement";
                document.getElementById('status').classList.replace('bg-blue-700', 'bg-red-600');
            }
        }

        // --- LÉGENDE ---
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<h4 class="font-bold mb-2">Légende</h4>';
            div.innerHTML += `<i style="background: ${styles.evenement.fillColor}"></i> Événement ponctuel<br>`;
            div.innerHTML += `<i style="background: ${styles.passagePieton.color}; height: 4px; margin-top: 7px;"></i> Passage problématique<br>`;
            div.innerHTML += `<i style="background: ${styles.revetement.fillColor}; opacity: 0.5;"></i> Revêtement trottoir<br>`;
            div.innerHTML += `<i style="background: ${styles.idee.fillColor}"></i> Idée d'amélioration<br>`;
            return div;
        };
        legend.addTo(map);

        // Démarrage
        window.onload = loadGeoJSON;

    </script>
</body>
</html>
